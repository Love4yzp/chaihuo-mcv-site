name: Sync Yuque Journals

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Yuque journal cards
        run: node scripts/sync-yuque-journals.mjs

      - name: Commit synced data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync yuque journals'
          file_pattern: src/data/yuque-journals.json public/yuque-journals/*
